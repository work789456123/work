# Build backend + frontend Docker images and push to Amazon ECR (ap-south-1).
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   (IAM user or role with ecr:GetAuthorizationToken, ecr:BatchCheckLayerAvailability,
#    ecr:CompleteLayerUpload, ecr:InitiateLayerUpload, ecr:PutImage, ecr:UploadLayerPart,
#    ecr:BatchGetImage on the target repositories.)
#
# Optional repository variable:
#   NEXT_PUBLIC_BACKEND_URL — passed to the frontend build (default: https://pashuvaani.com)

name: Build and push to ECR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ecr-build-push.yml"

permissions:
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  backend:
    name: Backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/pashuvaani-be:latest
            ${{ steps.login-ecr.outputs.registry }}/pashuvaani-be:${{ github.sha }}

  frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: NEXT_PUBLIC_BACKEND_URL="${{ vars.NEXT_PUBLIC_BACKEND_URL || '' }}"
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/pashuvaani-frontend:latest
            ${{ steps.login-ecr.outputs.registry }}/pashuvaani-frontend:${{ github.sha }}
