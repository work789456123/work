version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pashuvaani_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: pashuvaani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    container_name: pashuvaani_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend:/app
    command: sh -c "python init_db.py && alembic upgrade head || true && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
      - qdrant

  frontend:
    image: node:20-alpine
    container_name: pashuvaani_frontend
    restart: always
    working_dir: /app
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pashuvaani_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  pgdata:
  frontend_node_modules:
  qdrant_storage:
